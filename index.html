<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burker Rankings | Official</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --red:    #D4220E;
  --red2:   #ff3a1f;
  --gold:   #C9A84C;
  --gold2:  #e8c96a;
  --black:  #0c0c0c;
  --deep:   #080808;
  --panel:  #111111;
  --border: rgba(255,255,255,0.07);
  --muted:  rgba(255,255,255,0.4);
  --text:   rgba(255,255,255,0.82);
  --silver: #c0c0c0;
  --blue:   #4fc3f7;
  --green:  #81c784;
  --gray:   #888;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; font-size:16px; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--black);
  color: var(--text);
  overflow-x: hidden;
  min-height: 100vh;
}

/* ─── GRAIN OVERLAY ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.5;
}

/* ─── SCROLL ANIMATIONS ─── */
.reveal {
  opacity: 0;
  transform: translateY(36px);
  transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1);
}
.reveal.visible { opacity:1; transform:translateY(0); }
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.35s; }

/* ─── NAV ─── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 500;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 60px;
  transition: background 0.4s, padding 0.4s;
}
nav.scrolled {
  background: rgba(8,8,8,0.97);
  backdrop-filter: blur(20px);
  padding: 14px 60px;
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 1.25rem;
  letter-spacing: 0.5px;
  color: white;
  text-decoration: none;
}
.nav-logo span { color: var(--gold); }

.nav-links { display: flex; gap: 40px; align-items: center; }
.nav-links a {
  text-decoration: none;
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  transition: color 0.2s;
  position: relative;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 0;
  width: 0; height: 1px;
  background: var(--gold);
  transition: width 0.25s;
}
.nav-links a:hover { color: white; }
.nav-links a:hover::after { width: 100%; }
.nav-links a.nav-highlight { color: var(--gold); }

/* ─── PAGE HEADER ─── */
.page-header {
  min-height: 60vh;
  display: flex;
  align-items: flex-end;
  position: relative;
  overflow: hidden;
  background: var(--deep);
  padding: 0;
}

.page-header-layers {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.page-header-layers .hl-1 {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 80% at 30% 60%, rgba(212,34,14,0.1) 0%, transparent 65%);
}
.page-header-layers .hl-2 {
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(255,255,255,0.015) 80px, rgba(255,255,255,0.015) 81px),
    repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(255,255,255,0.015) 80px, rgba(255,255,255,0.015) 81px);
}
.page-header-layers .hl-3 {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(to top, var(--black), transparent);
}

.page-header-side-text {
  position: absolute;
  right: -20px; top: 50%;
  transform: translateY(-50%) rotate(90deg);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 10rem;
  color: rgba(255,255,255,0.02);
  letter-spacing: 10px;
  white-space: nowrap;
  pointer-events: none;
  user-select: none;
}

.page-header-content {
  position: relative;
  max-width: 1160px;
  margin: 0 auto;
  padding: 160px 60px 70px;
  width: 100%;
}

.eyebrow {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.eyebrow-line { width: 32px; height: 1px; background: var(--gold); }
.eyebrow-text {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: var(--gold);
}

.page-title {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: clamp(3.5rem, 9vw, 8rem);
  line-height: 0.95;
  color: white;
  margin-bottom: 20px;
}
.page-title em {
  font-style: italic;
  color: transparent;
  -webkit-text-stroke: 1.5px rgba(255,255,255,0.25);
}

.page-subtitle {
  font-size: 0.95rem;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 1px;
  max-width: 520px;
  margin-bottom: 36px;
}

/* ─── EDIT TOGGLE ─── */
.edit-toggle-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 36px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.65);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}
.edit-toggle-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  transform: translateY(-2px);
}
.edit-toggle-btn.active {
  background: var(--gold);
  color: var(--black);
  border-color: var(--gold);
}

/* ─── DIVIDER ─── */
.divider {
  width: 100%;
  height: 1px;
  background: var(--border);
}

/* ─── RANKINGS WRAP ─── */
.rankings-wrap {
  max-width: 1160px;
  margin: 0 auto;
  padding: 70px 60px 120px;
}

/* ─── TIER ─── */
.tier { margin-bottom: 4px; }

.tier-header {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 24px 36px;
  background: var(--panel);
  border-left: 3px solid var(--red);
  position: relative;
}

.tier-rank {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 4rem;
  line-height: 1;
  color: rgba(255,255,255,0.05);
  width: 64px;
  flex-shrink: 0;
  text-align: center;
}

.tier-info { flex: 1; }

.tier-label {
  font-size: 0.63rem;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 4px;
}

.tier-title {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 1.6rem;
  line-height: 1;
  color: white;
}

.tier-count {
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
}

/* Tier color themes */
.tier-1 .tier-header { border-left-color: var(--gold); }
.tier-1 .tier-label  { color: var(--gold); }
.tier-1 .tier-rank   { color: rgba(201,168,76,0.1); }

.tier-2 .tier-header { border-left-color: var(--silver); }
.tier-2 .tier-label  { color: var(--silver); }

.tier-3 .tier-header { border-left-color: var(--blue); }
.tier-3 .tier-label  { color: var(--blue); }

.tier-4 .tier-header { border-left-color: var(--green); }
.tier-4 .tier-label  { color: var(--green); }

.tier-5 .tier-header { border-left-color: var(--gray); }
.tier-5 .tier-label  { color: var(--gray); }

/* ─── MEMBERS LIST ─── */
.members-list {
  background: #0f0f0f;
  border-left: 3px solid rgba(255,255,255,0.03);
}

.tier-1 .members-list { border-left-color: rgba(201,168,76,0.12); }
.tier-2 .members-list { border-left-color: rgba(192,192,192,0.08); }
.tier-3 .members-list { border-left-color: rgba(79,195,247,0.08); }
.tier-4 .members-list { border-left-color: rgba(129,199,132,0.08); }
.tier-5 .members-list { border-left-color: rgba(136,136,136,0.08); }

.member-row {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 18px 36px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.2s;
  position: relative;
}
.member-row:last-child { border-bottom: none; }
.member-row:hover { background: rgba(255,255,255,0.025); }

.member-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  color: rgba(255,255,255,0.15);
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

.member-name {
  flex: 1;
  font-weight: 500;
  font-size: 0.95rem;
  letter-spacing: 0.3px;
  color: var(--text);
}

.member-note {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.25);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ─── EDIT MODE ─── */
.member-name-input {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 2px;
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 0.95rem;
  padding: 7px 14px;
  letter-spacing: 0.3px;
  outline: none;
  transition: border-color 0.2s;
}
.member-name-input:focus { border-color: var(--gold); }
.member-name-input::placeholder { color: rgba(255,255,255,0.18); }

.member-note-input {
  width: 180px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 2px;
  color: rgba(255,255,255,0.45);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem;
  padding: 7px 12px;
  outline: none;
  transition: border-color 0.2s;
}
.member-note-input:focus { border-color: var(--gold); }
.member-note-input::placeholder { color: rgba(255,255,255,0.15); }

.delete-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.15);
  cursor: pointer;
  font-size: 0.85rem;
  padding: 4px 8px;
  border-radius: 2px;
  transition: all 0.2s;
  display: none;
}
.delete-btn:hover { color: var(--red); background: rgba(212,34,14,0.08); }
body.edit-mode .delete-btn { display: flex; }

.add-member-row {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 14px 36px;
  color: rgba(255,255,255,0.2);
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  border-top: 1px solid rgba(255,255,255,0.04);
  transition: color 0.2s, background 0.2s;
}
.add-member-row:hover { color: var(--gold); background: rgba(201,168,76,0.04); }
body.edit-mode .add-member-row { display: flex; }

/* Empty state */
.empty-state {
  padding: 20px 36px;
  color: rgba(255,255,255,0.18);
  font-size: 0.82rem;
  font-style: italic;
  display: none;
}
.empty-state.visible { display: block; }

/* ─── SAVE BANNER ─── */
.save-banner {
  position: fixed;
  bottom: -80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--gold);
  color: var(--black);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 16px 48px;
  border-radius: 2px;
  cursor: pointer;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  transition: bottom 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 300;
  white-space: nowrap;
}
.save-banner.visible { bottom: 40px; }
.save-banner:hover { background: var(--gold2); }

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--panel);
  border: 1px solid var(--border);
  color: white;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 12px 28px;
  border-radius: 2px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 400;
}
.toast.show { opacity: 1; }

/* ─── FOOTER ─── */
footer {
  background: var(--deep);
  border-top: 1px solid var(--border);
  padding: 60px;
}
.footer-inner {
  max-width: 1160px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 40px;
  margin-bottom: 40px;
}
.footer-logo {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 1.4rem;
  color: white;
}
.footer-logo span { color: var(--gold); }

.footer-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.footer-center a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.78rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: color 0.2s;
}
.footer-center a:hover { color: var(--gold); }
.footer-divider-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
}

.footer-right {
  text-align: right;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.2);
  letter-spacing: 1px;
  line-height: 1.8;
  text-transform: uppercase;
}
.footer-bottom {
  max-width: 1160px;
  margin: 0 auto;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  font-size: 0.68rem;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.15);
}

/* ─── RESPONSIVE ─── */
@media (max-width: 900px) {
  nav { padding: 18px 28px; }
  nav.scrolled { padding: 12px 28px; }
  .nav-links { gap: 22px; }
  .page-header-content { padding: 140px 28px 60px; }
  .rankings-wrap { padding: 50px 28px 100px; }
  .tier-header { padding: 20px 24px; }
  .member-row { padding: 14px 24px; }
  .add-member-row { padding: 12px 24px; }
  .footer-inner { grid-template-columns: 1fr; text-align: center; }
  .footer-right { text-align: center; }
  .footer-bottom { flex-direction: column; gap: 10px; }
}
@media (max-width: 560px) {
  .member-note, .member-note-input { display: none; }
  .nav-links { gap: 14px; }
}
</style>
</head>
<body>

<!-- ─── NAV ─── -->
<nav id="mainNav">
  <a class="nav-logo" href="https://killerm0nkey182.github.io/darrelburke-site/">Darrel <span>Burke</span></a>
  <div class="nav-links">
    <a href="https://killerm0nkey182.github.io/darrelburke-site/" class="nav-highlight">← Back to Main</a>
  </div>
</nav>

<!-- ─── PAGE HEADER ─── -->
<div class="page-header">
  <div class="page-header-layers">
    <div class="hl-1"></div>
    <div class="hl-2"></div>
    <div class="hl-3"></div>
  </div>
  <div class="page-header-side-text">RANKS</div>

  <div class="page-header-content">
    <div class="eyebrow">
      <div class="eyebrow-line"></div>
      <div class="eyebrow-text">Official Roster</div>
    </div>
    <div class="page-title">
      Burker<br><em>Rankings</em>
    </div>
    <p class="page-subtitle">The official hierarchy of the Burker crew. All ranks and members listed below.</p>
    <button class="edit-toggle-btn" onclick="toggleEdit()" id="editBtn">
      ✎ &nbsp;Edit Rankings
    </button>
  </div>
</div>

<div class="divider"></div>

<!-- ─── RANKINGS ─── -->
<div class="rankings-wrap" id="rankingsWrap"></div>

<!-- ─── SAVE BANNER ─── -->
<div class="save-banner" id="saveBanner" onclick="saveData()">Save Changes</div>

<!-- ─── TOAST ─── -->
<div class="toast" id="toast">Saved successfully!</div>

<!-- ─── FOOTER ─── -->
<footer>
  <div class="footer-inner">
    <div class="footer-logo">Darrel <span>Burke</span></div>
    <div class="footer-center">
      <a href="https://killerm0nkey182.github.io/darrelburke-site/">Main Site</a>
      <div class="footer-divider-dot"></div>
      <a href="https://killerm0nkey182.github.io/Burker_Burgers/">Burker Shop</a>
    </div>
    <div class="footer-right">
      Official Roster<br>
      All Rights Reserved
    </div>
  </div>
  <div class="footer-bottom">
    <span>Darrel Burke &copy; 2025</span>
    <span>Built for the Burker Crew</span>
  </div>
</footer>

<script>
  // ─── NAV SCROLL ───
  const nav = document.getElementById('mainNav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 60);
  }, { passive: true });

  // ─── DATA ───
  const TIERS = [
    { id: 'tier1', rank: '01', label: 'Tier I',   title: 'President',            color: 'tier-1' },
    { id: 'tier2', rank: '02', label: 'Tier II',  title: 'Vice Presidents',      color: 'tier-2' },
    { id: 'tier3', rank: '03', label: 'Tier III', title: 'Senior Tech Burker',   color: 'tier-3' },
    { id: 'tier4', rank: '04', label: 'Tier IV',  title: 'Senior Burker',        color: 'tier-4' },
    { id: 'tier5', rank: '05', label: 'Tier V',   title: 'Junior Burker',        color: 'tier-5' },
  ];

  function defaultData() {
    return {
      tier1: [{ name: 'Darrel Burke', note: 'Founder' }],
      tier2: [{ name: 'Clayton', note: '' }, { name: 'Stone', note: '' }],
      tier3: [{ name: 'Marcus', note: '' }, { name: 'Noah', note: '' }],
      tier4: [{ name: 'Zachary', note: '' }, { name: 'Temu', note: '' }, { name: 'Austin', note: '' }],
      tier5: [{ name: 'Cooper', note: '' }],
    };
  }

  function loadData() {
    const base = defaultData();
    try {
      const saved = localStorage.getItem('burkerRankings');
      return saved ? JSON.parse(saved) : base;
    } catch { return base; }
  }

  let data = loadData();
  let editMode = false;
  let hasChanges = false;

  // ─── RENDER ───
  function render() {
    const wrap = document.getElementById('rankingsWrap');
    wrap.innerHTML = '';

    TIERS.forEach(tier => {
      const members = data[tier.id] || [];

      const tierEl = document.createElement('div');
      tierEl.className = `tier ${tier.color} reveal`;
      tierEl.innerHTML = `
        <div class="tier-header">
          <div class="tier-rank">${tier.rank}</div>
          <div class="tier-info">
            <div class="tier-label">${tier.label}</div>
            <div class="tier-title">${tier.title}</div>
          </div>
          <div class="tier-count">${members.length} ${members.length === 1 ? 'Member' : 'Members'}</div>
        </div>
      `;

      const listEl = document.createElement('div');
      listEl.className = 'members-list';

      if (members.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state' + (editMode ? ' visible' : '');
        empty.textContent = 'No members yet — add one below.';
        listEl.appendChild(empty);
      }

      members.forEach((m, i) => {
        const row = document.createElement('div');
        row.className = 'member-row';

        if (editMode) {
          row.innerHTML = `
            <div class="member-num">${i + 1}</div>
            <input class="member-name-input" value="${escHtml(m.name)}" placeholder="Member name…"
              oninput="updateMember('${tier.id}',${i},'name',this.value)" />
            <input class="member-note-input" value="${escHtml(m.note || '')}" placeholder="Note / role…"
              oninput="updateMember('${tier.id}',${i},'note',this.value)" />
            <button class="delete-btn" onclick="deleteMember('${tier.id}',${i})" title="Remove">✕</button>
          `;
        } else {
          row.innerHTML = `
            <div class="member-num">${i + 1}</div>
            <div class="member-name">${escHtml(m.name) || '<span style="opacity:.25">Unnamed</span>'}</div>
            <div class="member-note">${escHtml(m.note || '')}</div>
          `;
        }

        listEl.appendChild(row);
      });

      const addRow = document.createElement('div');
      addRow.className = 'add-member-row';
      addRow.innerHTML = `<span style="font-size:1rem;line-height:1">+</span> Add Member`;
      addRow.onclick = () => addMember(tier.id);
      listEl.appendChild(addRow);

      tierEl.appendChild(listEl);
      wrap.appendChild(tierEl);
    });

    // Re-run reveal on newly rendered items
    observeReveals();
  }

  // ─── HELPERS ───
  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function markChanged() {
    hasChanges = true;
    document.getElementById('saveBanner').classList.add('visible');
  }

  function updateMember(tierId, idx, field, val) {
    data[tierId][idx][field] = val;
    markChanged();
    updateMemberCounts();
  }

  function updateMemberCounts() {
    TIERS.forEach((tier, ti) => {
      const headers = document.querySelectorAll('.tier-header');
      if (headers[ti]) {
        const cnt = data[tier.id].length;
        const countEl = headers[ti].querySelector('.tier-count');
        if (countEl) countEl.textContent = `${cnt} ${cnt === 1 ? 'Member' : 'Members'}`;
      }
    });
  }

  function addMember(tierId) {
    data[tierId].push({ name: '', note: '' });
    markChanged();
    render();
    setTimeout(() => {
      const lists = document.querySelectorAll('.members-list');
      const tierIdx = TIERS.findIndex(t => t.id === tierId);
      if (lists[tierIdx]) {
        const inputs = lists[tierIdx].querySelectorAll('.member-name-input');
        if (inputs.length) inputs[inputs.length - 1].focus();
      }
    }, 50);
  }

  function deleteMember(tierId, idx) {
    data[tierId].splice(idx, 1);
    markChanged();
    render();
  }

  function toggleEdit() {
    editMode = !editMode;
    document.body.classList.toggle('edit-mode', editMode);
    const btn = document.getElementById('editBtn');
    btn.classList.toggle('active', editMode);
    btn.innerHTML = editMode ? '✓ &nbsp;Done Editing' : '✎ &nbsp;Edit Rankings';
    render();
  }

  function saveData() {
    TIERS.forEach((tier, ti) => {
      const lists = document.querySelectorAll('.members-list');
      if (!lists[ti]) return;
      const nameInputs = lists[ti].querySelectorAll('.member-name-input');
      const noteInputs = lists[ti].querySelectorAll('.member-note-input');
      nameInputs.forEach((inp, i) => { if (data[tier.id][i]) data[tier.id][i].name = inp.value; });
      noteInputs.forEach((inp, i) => { if (data[tier.id][i]) data[tier.id][i].note = inp.value; });
    });
    localStorage.setItem('burkerRankings', JSON.stringify(data));
    hasChanges = false;
    document.getElementById('saveBanner').classList.remove('visible');
    showToast('Saved successfully!');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ─── SCROLL REVEAL ───
  let revealObserver;
  function observeReveals() {
    if (revealObserver) revealObserver.disconnect();
    revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          revealObserver.unobserve(e.target);
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
  }

  window.addEventListener('beforeunload', e => {
    if (hasChanges) { e.preventDefault(); e.returnValue = ''; }
  });

  render();
</script>
</body>
</html>
