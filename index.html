<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burker Rankings</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8200A;
    --dark-red: #b01a08;
    --black: #111111;
    --off-black: #1a1a1a;
    --yellow: #FFD100;
    --gray: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--black);
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 48px;
    background: rgba(17,17,17,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 2px;
    color: var(--yellow);
  }

  .nav-links { display: flex; gap: 24px; align-items: center; }
  .nav-links a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--yellow); }

  /* ── HERO HEADER ── */
  .page-header {
    padding: 140px 48px 60px;
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
  }

  .page-header-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 14px;
  }

  .page-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 10vw, 9rem);
    line-height: 0.9;
    letter-spacing: 3px;
  }

  .page-header h1 span { color: var(--red); }

  .page-header p {
    margin-top: 20px;
    color: rgba(255,255,255,0.45);
    font-size: 1rem;
    letter-spacing: 1px;
    max-width: 500px;
  }

  .edit-toggle-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 32px;
    padding: 13px 32px;
    background: var(--off-black);
    border: 1px solid rgba(255,255,255,0.12);
    color: white;
    font-family: 'Barlow', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
  }
  .edit-toggle-btn:hover {
    border-color: var(--yellow);
    color: var(--yellow);
  }
  .edit-toggle-btn.active {
    background: var(--yellow);
    color: var(--black);
    border-color: var(--yellow);
  }
  /* ── FULL DIVIDER ── */
  .full-divider {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin-bottom: 0;
  }

  /* ── RANKINGS ── */
  .rankings-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 48px 100px;
  }

  /* Tier block */
  .tier {
    margin-bottom: 4px;
  }

  .tier-header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 22px 32px;
    background: var(--off-black);
    border-left: 4px solid var(--red);
    position: relative;
  }

  .tier-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    line-height: 1;
    color: rgba(255,255,255,0.08);
    width: 60px;
    flex-shrink: 0;
    text-align: center;
  }

  .tier-info { flex: 1; }

  .tier-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 4px;
  }

  .tier-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    line-height: 1;
  }

  /* Color by tier */
  .tier-1 .tier-header { border-left-color: var(--yellow); }
  .tier-1 .tier-label { color: var(--yellow); }
  .tier-1 .tier-rank { color: rgba(255,209,0,0.12); }

  .tier-2 .tier-header { border-left-color: #c0c0c0; }
  .tier-2 .tier-label { color: #c0c0c0; }

  .tier-3 .tier-header { border-left-color: #4fc3f7; }
  .tier-3 .tier-label { color: #4fc3f7; }

  .tier-4 .tier-header { border-left-color: #81c784; }
  .tier-4 .tier-label { color: #81c784; }

  .tier-5 .tier-header { border-left-color: var(--gray); }
  .tier-5 .tier-label { color: var(--gray); }

  /* Members list */
  .members-list {
    background: #141414;
    border-left: 4px solid rgba(255,255,255,0.04);
  }

  .tier-1 .members-list { border-left-color: rgba(255,209,0,0.12); }
  .tier-2 .members-list { border-left-color: rgba(192,192,192,0.1); }
  .tier-3 .members-list { border-left-color: rgba(79,195,247,0.1); }
  .tier-4 .members-list { border-left-color: rgba(129,199,132,0.1); }
  .tier-5 .members-list { border-left-color: rgba(136,136,136,0.1); }

  .member-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 32px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.2s;
    position: relative;
  }
  .member-row:last-child { border-bottom: none; }
  .member-row:hover { background: rgba(255,255,255,0.03); }

  .member-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: rgba(255,255,255,0.2);
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }

  .member-name {
    flex: 1;
    font-weight: 600;
    font-size: 1rem;
    letter-spacing: 0.5px;
  }

  .member-note {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.5px;
  }

  /* Edit mode styles */
  .member-name-input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 3px;
    color: white;
    font-family: 'Barlow', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    padding: 6px 12px;
    letter-spacing: 0.5px;
    outline: none;
    transition: border-color 0.2s;
  }
  .member-name-input:focus { border-color: var(--yellow); }
  .member-name-input::placeholder { color: rgba(255,255,255,0.2); }

  .member-note-input {
    width: 180px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px;
    color: rgba(255,255,255,0.5);
    font-family: 'Barlow', sans-serif;
    font-size: 0.8rem;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .member-note-input:focus { border-color: var(--yellow); }
  .member-note-input::placeholder { color: rgba(255,255,255,0.15); }

  .delete-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.2);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px 8px;
    border-radius: 3px;
    transition: all 0.2s;
    display: none;
  }
  .delete-btn:hover { color: var(--red); background: rgba(232,32,10,0.1); }

  /* Add member button */
  .add-member-row {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 14px 32px;
    cursor: pointer;
    color: rgba(255,255,255,0.25);
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
    background: #141414;
    border-left: 4px solid rgba(255,255,255,0.04);
    border-top: 1px dashed rgba(255,255,255,0.07);
  }
  .add-member-row:hover { color: var(--yellow); background: rgba(255,209,0,0.03); }
  .add-member-row span { font-size: 1.2rem; }

  /* Edit mode active */
  body.edit-mode .delete-btn { display: flex; }
  body.edit-mode .add-member-row { display: flex; }

  /* Save banner */
  .save-banner {
    position: fixed;
    bottom: -80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--yellow);
    color: var(--black);
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 16px 40px;
    border-radius: 4px;
    cursor: pointer;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    transition: bottom 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 300;
    white-space: nowrap;
  }
  .save-banner.visible { bottom: 36px; }
  .save-banner:hover { background: #ffe033; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%) translateY(0);
    background: #1e1e1e;
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 12px 28px;
    border-radius: 4px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 400;
  }
  .toast.show { opacity: 1; }

  /* Empty state */
  .empty-state {
    padding: 24px 32px;
    color: rgba(255,255,255,0.2);
    font-size: 0.85rem;
    font-style: italic;
    background: #141414;
    border-left: 4px solid rgba(255,255,255,0.04);
    display: none;
  }
  .empty-state.visible { display: block; }

  /* Responsive */
  @media (max-width: 768px) {
    nav { padding: 16px 20px; }
    .page-header { padding: 120px 20px 40px; }
    .rankings-wrap { padding: 40px 20px 80px; }
    .tier-header { padding: 18px 20px; }
    .member-row { padding: 14px 20px; }
    .add-member-row { padding: 12px 20px; }
    .member-note, .member-note-input { display: none; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">Burker</div>
  <div class="nav-links">
    <a href="https://killerm0nkey182.github.io/darrelburke-site/" target="_self">← Back to Main</a>
  </div>
</nav>

<!-- HEADER -->
<div class="page-header">
  <div class="page-header-label">Official Roster</div>
  <h1>BURKER<br><span>RANKINGS</span></h1>
  <p>The official hierarchy of the Burker crew. All ranks and members listed below.</p>
  <button class="edit-toggle-btn" onclick="toggleEdit()" id="editBtn">
    Edit Rankings
  </button>
</div>

<div class="full-divider"></div>

<!-- RANKINGS -->
<div class="rankings-wrap" id="rankingsWrap"></div>

<!-- SAVE BANNER -->
<div class="save-banner" id="saveBanner" onclick="saveData()">Save Changes</div>

<!-- TOAST -->
<div class="toast" id="toast">Saved successfully!</div>

<script>
  // ── DATA ──
  const TIERS = [
    { id: 'tier1', rank: '01', label: 'Tier I', title: 'President',          color: 'tier-1' },
    { id: 'tier2', rank: '02', label: 'Tier II', title: 'Vice Presidents',   color: 'tier-2' },
    { id: 'tier3', rank: '03', label: 'Tier III', title: 'Senior Tech Burker', color: 'tier-3' },
    { id: 'tier4', rank: '04', label: 'Tier IV', title: 'Senior Burker',     color: 'tier-4' },
    { id: 'tier5', rank: '05', label: 'Tier V', title: 'Junior Burker',      color: 'tier-5' },
  ];

  function defaultData() {
    return {
      tier1: [{ name: 'Darrel Burke', note: 'Founder' }],
      tier2: [{ name: 'Clayton', note: '' }, { name: 'Stone', note: '' }],
      tier3: [{ name: 'Marcus', note: '' }, { name: 'Noah', note: '' }],
      tier4: [{ name: 'Zachary', note: '' }, { name: 'Temu', note: '' }, { name: 'Austin', note: '' }],
      tier5: [{ name: 'Cooper', note: '' }],
    };
  }

  function loadData() {
    // Always start from hardcoded defaults; saved edits merge on top
    const base = defaultData();
    try {
      const saved = localStorage.getItem('burkerRankings');
      return saved ? JSON.parse(saved) : base;
    } catch { return base; }
  }

  let data = loadData();
  let editMode = false;
  let hasChanges = false;

  // ── RENDER ──
  function render() {
    const wrap = document.getElementById('rankingsWrap');
    wrap.innerHTML = '';

    TIERS.forEach(tier => {
      const members = data[tier.id] || [];

      const tierEl = document.createElement('div');
      tierEl.className = `tier ${tier.color}`;
      tierEl.innerHTML = `
        <div class="tier-header">
          <div class="tier-rank">${tier.rank}</div>
          <div class="tier-info">
            <div class="tier-label">${tier.label}</div>
            <div class="tier-title">${tier.title}</div>
          </div>
          <div style="color:rgba(255,255,255,0.25);font-size:0.8rem;letter-spacing:2px;font-weight:600;">
            ${members.length} ${members.length === 1 ? 'MEMBER' : 'MEMBERS'}
          </div>
        </div>
      `;

      const listEl = document.createElement('div');
      listEl.className = 'members-list';

      if (members.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state' + (editMode ? ' visible' : '');
        empty.textContent = 'No members yet — add one below.';
        listEl.appendChild(empty);
      }

      members.forEach((m, i) => {
        const row = document.createElement('div');
        row.className = 'member-row';

        if (editMode) {
          row.innerHTML = `
            <div class="member-num">${i + 1}</div>
            <input class="member-name-input" value="${escHtml(m.name)}" placeholder="Member name…"
              oninput="updateMember('${tier.id}',${i},'name',this.value)" />
            <input class="member-note-input" value="${escHtml(m.note || '')}" placeholder="Note / role…"
              oninput="updateMember('${tier.id}',${i},'note',this.value)" />
            <button class="delete-btn" onclick="deleteMember('${tier.id}',${i})" title="Remove">✕</button>
          `;
        } else {
          row.innerHTML = `
            <div class="member-num">${i + 1}</div>
            <div class="member-name">${escHtml(m.name) || '<span style="opacity:.3">Unnamed</span>'}</div>
            <div class="member-note">${escHtml(m.note || '')}</div>
          `;
        }

        listEl.appendChild(row);
      });

      // Add member button (edit mode only)
      const addRow = document.createElement('div');
      addRow.className = 'add-member-row';
      addRow.innerHTML = `<span>+</span> Add Member`;
      addRow.onclick = () => addMember(tier.id);
      listEl.appendChild(addRow);

      tierEl.appendChild(listEl);
      wrap.appendChild(tierEl);
    });
  }

  // ── HELPERS ──
  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function markChanged() {
    hasChanges = true;
    document.getElementById('saveBanner').classList.add('visible');
  }

  function updateMember(tierId, idx, field, val) {
    data[tierId][idx][field] = val;
    markChanged();
    // update member count without full re-render
    updateMemberCounts();
  }

  function updateMemberCounts() {
    // lightweight - just re-render counts in headers
    TIERS.forEach((tier, ti) => {
      const headers = document.querySelectorAll('.tier-header');
      if (headers[ti]) {
        const cnt = data[tier.id].length;
        const countEl = headers[ti].querySelector('div:last-child');
        if (countEl) countEl.textContent = `${cnt} ${cnt === 1 ? 'MEMBER' : 'MEMBERS'}`;
      }
    });
  }

  function addMember(tierId) {
    data[tierId].push({ name: '', note: '' });
    markChanged();
    render();
    // Focus the new input
    setTimeout(() => {
      const lists = document.querySelectorAll('.members-list');
      const tierIdx = TIERS.findIndex(t => t.id === tierId);
      if (lists[tierIdx]) {
        const inputs = lists[tierIdx].querySelectorAll('.member-name-input');
        if (inputs.length) inputs[inputs.length - 1].focus();
      }
    }, 50);
  }

  function deleteMember(tierId, idx) {
    data[tierId].splice(idx, 1);
    markChanged();
    render();
  }

  function toggleEdit() {
    editMode = !editMode;
    document.body.classList.toggle('edit-mode', editMode);
    const btn = document.getElementById('editBtn');
    btn.classList.toggle('active', editMode);
    btn.innerHTML = editMode
      ? 'Done Editing'
      : 'Edit Rankings';
    render();
  }

  function saveData() {
    // Collect any unsaved input values (in case oninput missed anything)
    TIERS.forEach((tier, ti) => {
      const lists = document.querySelectorAll('.members-list');
      if (!lists[ti]) return;
      const nameInputs = lists[ti].querySelectorAll('.member-name-input');
      const noteInputs = lists[ti].querySelectorAll('.member-note-input');
      nameInputs.forEach((inp, i) => { if (data[tier.id][i]) data[tier.id][i].name = inp.value; });
      noteInputs.forEach((inp, i) => { if (data[tier.id][i]) data[tier.id][i].note = inp.value; });
    });

    localStorage.setItem('burkerRankings', JSON.stringify(data));
    hasChanges = false;
    document.getElementById('saveBanner').classList.remove('visible');
    showToast('Saved successfully!');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Warn on close if unsaved
  window.addEventListener('beforeunload', e => {
    if (hasChanges) { e.preventDefault(); e.returnValue = ''; }
  });

  // Initial render
  render();
</script>
</body>
</html>
